<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1e40af"/>
  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="7" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <!-- AI circuit dots inside lens -->
  <circle cx="11" cy="12" r="1" fill="#60a5fa"/>
  <circle cx="13" cy="10" r="1" fill="#a78bfa"/>
  <circle cx="15" cy="12" r="1" fill="#60a5fa"/>
  <circle cx="13" cy="14" r="1" fill="#34d399"/>
  <!-- Circuit lines -->
  <line x1="11" y1="12" x2="13" y2="10" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
  <line x1="13" y1="10" x2="15" y2="12" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <line x1="15" y1="12" x2="13" y2="14" stroke="#60a5fa" stroke-width="0.8" opacity="0.7"/>
  <line x1="13" y1="14" x2="11" y2="12" stroke="#34d399" stroke-width="0.8" opacity="0.7"/>
  <!-- Handle -->
  <line x1="18.5" y1="18.5" x2="23" y2="23" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
</svg>
