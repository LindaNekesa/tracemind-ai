<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#1e3a8a"/>
  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="6.5" fill="none" stroke="#60a5fa" stroke-width="2.2"/>
  <!-- AI neural dots inside lens -->
  <circle cx="11.5" cy="13" r="1.2" fill="#60a5fa"/>
  <circle cx="14.5" cy="11" r="1.2" fill="#a78bfa"/>
  <circle cx="14.5" cy="15" r="1.2" fill="#34d399"/>
  <!-- Neural connections -->
  <line x1="11.5" y1="13" x2="14.5" y2="11" stroke="#60a5fa" stroke-width="0.9" opacity="0.8"/>
  <line x1="11.5" y1="13" x2="14.5" y2="15" stroke="#34d399" stroke-width="0.9" opacity="0.8"/>
  <line x1="14.5" y1="11" x2="14.5" y2="15" stroke="#a78bfa" stroke-width="0.9" opacity="0.8"/>
  <!-- Handle -->
  <line x1="18" y1="18" x2="23" y2="23" stroke="#93c5fd" stroke-width="2.4" stroke-linecap="round"/>
</svg>
